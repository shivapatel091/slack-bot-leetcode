name: Daily LeetCode Problem

on:
  schedule:
    - cron: "30 5 * * *"  # 11:00 AM IST (UTC+5:30)
  workflow_dispatch:        # allow manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install slack-sdk requests

      - name: Post daily problem
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python3 << 'EOF'
          import os, re, requests
          from slack_sdk import WebClient

          SLACK_TOKEN = os.getenv("SLACK_BOT_TOKEN")
          CHANNEL_ID = os.getenv("SLACK_CHANNEL_ID")

          LEETCODE_QUERY = """
          query questionOfToday {
            activeDailyCodingChallengeQuestion {
              date
              link
              question {
                frontendQuestionId: questionFrontendId
                title
                difficulty
                topicTags { name }
                acRate
                isPaidOnly
                content
              }
            }
          }
          """

          def strip_html(html):
              html = re.sub(r'<pre>(.*?)</pre>', lambda m: '\n```\n' + m.group(1) + '\n```\n', html, flags=re.DOTALL)
              html = re.sub(r'<[^>]+>', '', html)
              html = re.sub(r'&nbsp;', ' ', html)
              html = re.sub(r'&lt;', '<', html)
              html = re.sub(r'&gt;', '>', html)
              html = re.sub(r'&amp;', '&', html)
              html = re.sub(r'&quot;', '"', html)
              html = re.sub(r'\n{3,}', '\n\n', html)
              return html.strip()

          resp = requests.post(
              "https://leetcode.com/graphql",
              json={"query": LEETCODE_QUERY},
              headers={"Content-Type": "application/json"},
              timeout=10,
          )
          resp.raise_for_status()
          problem_data = resp.json()["data"]["activeDailyCodingChallengeQuestion"]
          q = problem_data["question"]

          number = q["frontendQuestionId"]
          title = q["title"]
          difficulty = q["difficulty"]
          link = f"https://leetcode.com{problem_data['link']}"
          tags = ", ".join(tag["name"] for tag in q["topicTags"]) or "N/A"
          acceptance = f"{q['acRate']:.1f}%"
          date = problem_data["date"]
          is_paid = q["isPaidOnly"]
          description = strip_html(q["content"] or "")
          # Slack block text limit is 3000 chars
          if len(description) > 2900:
              description = description[:2900] + "...\n\n_(truncated — see full problem on LeetCode)_"

          emoji_map = {"Easy": ":large_green_circle:", "Medium": ":large_yellow_circle:", "Hard": ":red_circle:"}
          emoji = emoji_map.get(difficulty, ":white_circle:")

          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": f"Daily LeetCode Problem — {date}"}},
              {"type": "section", "text": {"type": "mrkdwn", "text": f"*<{link}|#{number} — {title}>*"}},
              {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": f"*Difficulty:*\n{emoji} {difficulty}"},
                  {"type": "mrkdwn", "text": f"*Acceptance Rate:*\n{acceptance}"},
              ]},
              {"type": "section", "text": {"type": "mrkdwn", "text": f"*Topics:*\n{tags}"}},
              {"type": "divider"},
              {"type": "section", "text": {"type": "mrkdwn", "text": description}},
              {"type": "divider"},
              {"type": "context", "elements": [{"type": "mrkdwn", "text": "⚠️ Premium problem." if is_paid else "Good luck! 🚀 Solve it today."}]},
          ]

          client = WebClient(token=SLACK_TOKEN)
          client.chat_postMessage(channel=CHANNEL_ID, blocks=blocks, text="Daily LeetCode Problem")
          print(f"Posted: {title}")
          EOF
